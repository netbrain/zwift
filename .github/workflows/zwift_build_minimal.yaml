---
name: Zwift build minimal
'on':
  workflow_dispatch:
  push:
    branches:
    - master
    paths:
    - src/Dockerfile
concurrency:
  group: zwift-minimal-container-image
jobs:
  zwift_build_minimal:
    if: github.repository == 'netbrain/zwift'
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Checkout
      uses: actions/checkout@v6
    - name: Build and push minimal image
      run: |
        build_date="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

        docker build \
            --label "org.opencontainers.image.created=${build_date}" \
            -t netbrain/zwift:minimal \
            src/

        docker push netbrain/zwift:minimal
